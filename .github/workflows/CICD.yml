name: CICD

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build documentation without warnings
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --no-deps --document-private-items

  build:
    name: Build (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    needs:
      - lint
      - test
      - documentation
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: linux-x86_64
            binary: rebe
          - os: macos-15-intel
            asset: macos-x86_64
            binary: rebe
          - os: windows-latest
            asset: windows-x86_64.exe
            binary: rebe.exe
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --locked --release
      - name: Stage release binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary }}" "dist/rebe-${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: rebe-${{ matrix.asset }}
          path: dist/rebe-${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            README.md
            LICENSE

  all-jobs:
    name: all-jobs
    if: always()
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - documentation
      - build
    steps:
      - run: jq --exit-status 'all(.result == "success")' <<< '${{ toJson(needs) }}'
